AWSTemplateFormatVersion: '2010-09-09'
Description: SecurityGroup configuration

Parameters:

  VPCID:
    Type: String

Resources:
SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: Allow SSH and HTTP
      GroupName: sandbox-sg
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${Vpcname}-sg'
          
Outputs:

  VPCID:
    Description: SecurityGroupId
    Value: !Ref SecurityGroup


